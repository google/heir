<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 350" role="img" aria-labelledby="oc-title oc-desc">
  <title id="oc-title">Orion convolution data layout</title>
  <desc id="oc-desc">Diagram modified from Fig 3 of Orion: A Fully Homomorphic Encryption Framework for Deep Learning, showing input-filter convolution and the resulting layout matrix.</desc>
  <style>
    .cell { stroke: #888; stroke-width: 1; }
    .cell-white { fill: #fff; }
    .cell-green { fill: #b8e6b8; }
    .cell-gray  { fill: #d9d9d9; }
    .txt { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #333; text-anchor: middle; dominant-baseline: central; }
    .txt-it { font-style: italic; }
    .txt-label { font-size: 14px; font-style: italic; fill: #333; }
    .txt-cap { font-size: 12px; fill: #555; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .op { font-size: 22px; fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .brace { font-size: 13px; fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>

  <!-- ===== INPUT 3x3 ===== -->
