name: Build and upload Python wheels

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. v2026.04.01). Leave empty for dev build.'
        required: false
        default: ''
  pull_request:
    types: [labeled]
  push:
    tags:
      - 'v*'

jobs:
  setup-version:
    name: Setup version and publication status
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      github.event_name == 'push' ||
      github.event.label.name == 'ci:wheels'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_publish: ${{ steps.get-version.outputs.should_publish }}
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - name: Install dependencies
        run: pip install requests
      - name: Get version
        id: get-version
        shell: bash
        run: |
          python scripts/get_version.py \
            --event "${{ github.event_name == 'push' && 'release' || github.event_name }}" \
            --ref "${{ github.ref }}" \
            --tag "${{ github.event.release.tag_name || inputs.tag_name || (github.event_name == 'push' && github.ref_name || '') }}" \
            --package "heir_py" \
            --gha

  build_sdist:
    name: Build source distribution
    needs: [setup-version]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      github.event_name == 'push' ||
      github.event.label.name == 'ci:wheels'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag_name || github.ref }}
          fetch-depth: 0
      - name: Install Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - name: Build sdist
        run: |
          if [[ -n "${{ needs.setup-version.outputs.version }}" ]]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION="${{ needs.setup-version.outputs.version }}"
          fi
          python -m build --sdist
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build HEIR wheels on ${{ matrix.name }}
    needs: [setup-version]
    # On PRs, only run when the ci:wheels label is added.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      github.event_name == 'push' ||
      github.event.label.name == 'ci:wheels'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          # TODO(#2798): fix macos-intel support or abandon the wheel
          # - name: macos-x86_64
          #   runner: macos-15-intel
          - name: macos-arm64
            runner: macos-15

    steps:
      - name: Check out HEIR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag_name || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        name: Install Python 3.12
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip uv

      - name: Build wheels on ${{ matrix.name }} using cibuildwheel
        uses: pypa/cibuildwheel@5f22145df44122af0f5a201f93cf0207171beca7 # v3.0.0
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.setup-version.outputs.version }}
          # Pass the version env var into Linux Docker containers without
          # overriding the environment config in pyproject.toml (which sets PATH).
          CIBW_ENVIRONMENT_PASS: SETUPTOOLS_SCM_PRETEND_VERSION

      - name: Upload HEIR ${{ matrix.name }} wheels
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist-${{ matrix.name }}
          path: wheelhouse/*.whl

  pypi_upload:
    name: Publish heir wheels to PyPI
    needs: [setup-version, build_sdist, build_wheels]
    # Only publish from main or releases based on setup-version logic
    if: needs.setup-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # Cf. trusted publishers on PyPI
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1.13
        with:
          verbose: true
